services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-flexibudget}
      MYSQL_USER: ${DB_USER:-flexiuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme_db_pass}
    volumes:
      - flexi_mysql:/var/lib/mysql
    ports:
      - "${DB_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-flexiuser}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_db_pass}
      DB_NAME: ${DB_NAME:-flexibudget}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a 32+ char random string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: "true"
    ports:
      - "${API_PUBLISH_PORT:-5000}:5000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PUBLISH_PORT:-8080}:80"

volumes:
  flexi_mysql:
