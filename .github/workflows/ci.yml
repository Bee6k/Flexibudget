name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flexibudget_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=15s
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: flexibudget_test
      JWT_SECRET: flexibudget-ci-jwt-secret-minimum-32-chars-xx
      JWT_EXPIRES_IN: 1h
      JEST_FORCE_SYNC: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Wait for MySQL
        run: node -e "const net=require('net');const tryOnce=()=>new Promise(res=>{const s=net.connect(3306,'127.0.0.1',()=>{s.end();res(true)});s.on('error',()=>res(false));});(async()=>{for(let i=0;i<60;i++){if(await tryOnce()){console.log('MySQL port open');process.exit(0);}await new Promise(r=>setTimeout(r,1000));}console.error('MySQL not reachable');process.exit(1);})();"
      - name: Run tests
        run: npm test 2>&1 | tee test-output.txt; exit ${PIPESTATUS[0]}
      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: backend/test-output.txt
      - name: Annotate failures
        if: failure()
        run: |
          if [ -f test-output.txt ]; then
            {
              echo "## Backend tests"
              echo
              echo '```'
              tail -n 100 test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            grep -E 'FAIL |Expected:|Received:|Error:|Sequelize' test-output.txt | tail -n 40 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Production build
        env:
          VITE_API_URL: /api
        run: npm run build
