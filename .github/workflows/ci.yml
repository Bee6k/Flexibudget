name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flexibudget_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=15s
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: flexibudget_test
      JWT_SECRET: flexibudget-ci-jwt-secret-minimum-32-chars-xx
      JWT_EXPIRES_IN: 1h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Wait for MySQL
        run: node -e "const net=require('net'); const tryOnce=()=>new Promise((res)=>{const s=net.connect(3306,'127.0.0.1',()=>{s.end();res(true)});s.on('error',()=>res(false));}); (async()=>{for(let i=0;i<60;i++){if(await tryOnce()){console.log('MySQL port open');process.exit(0);} await new Promise(r=>setTimeout(r,1000));} console.error('MySQL not reachable'); process.exit(1);})();"
      - name: DB preflight
        run: |
          node -e "
          const sequelize = require('./config/database');
          (async () => {
            console.log('DB', process.env.DB_HOST, process.env.DB_USER, process.env.DB_NAME);
            try {
              await sequelize.authenticate();
              console.log('authenticate ok');
              await sequelize.sync();
              console.log('sync ok');
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          })();
          "
      - name: Run tests
        run: npm test -- --verbose --runInBand

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Production build
        env:
          VITE_API_URL: /api
        run: npm run build
